<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>Board</title>
</head>
<body>
    <table>
        <th:block th:each="tiles : ${board.mapToRows()}">
            <tr>
                <th:block th:each="tile : ${tiles}">
                    <td th:text="${tile.weight}"></td>
                </th:block>
            </tr>
        </th:block>
    </table>
</body>
</html>
